name: Sitemap Cache Warmer

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl xmlstarlet

      - name: Get sitemap list
        run: |
          curl -A "Mozilla/5.0" -L -s https://www.artkul.com/sitemap_index.xml | \
          xmlstarlet sel -t -v "//loc" > sitemaps.txt

      - name: Crawl sitemaps
        run: |
          while read sitemap; do
            echo "Reading $sitemap"
            curl -A "Mozilla/5.0" -L -s $sitemap | xmlstarlet sel -t -v "//loc" | while read url; do
              echo "Visiting $url"
              curl -A "Mozilla/5.0" -L -s -o /dev/null "$url"
            done
          done < sitemaps.txt
