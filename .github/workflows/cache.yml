name: Sitemap Cache Warmer

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl xmlstarlet

      - name: Crawl post sitemap
        run: |
          curl -A "Mozilla/5.0" -L https://www.artkul.com/post-sitemap.xml > post.xml
          xmlstarlet sel -t -v "//loc" post.xml | while read url; do
            echo "Visiting $url"
            curl -A "Mozilla/5.0" -L -o /dev/null "$url"
          done

      - name: Crawl page sitemap
        run: |
          curl -A "Mozilla/5.0" -L https://www.artkul.com/page-sitemap.xml > page.xml
          xmlstarlet sel -t -v "//loc" page.xml | while read url; do
            echo "Visiting $url"
            curl -A "Mozilla/5.0" -L -o /dev/null "$url"
          done
